<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting…</title>
  <script>
    var id = new URLSearchParams(location.search).get('id');
    if (id) {
      location.replace('/blog/' + encodeURIComponent(id) + '/');
    } else {
      location.replace('/blog/');
    }
  </script>
</head>
<body>
  <p>Redirecting to blog…</p>
</body>
</html>
